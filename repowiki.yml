name: RepoWiki — Auto-generate documentation

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'docs/wiki/**'          # prevent infinite loop
      - '**.md'
  schedule:
    - cron: '0 2 * * 1'        # every Monday at 2am UTC
  workflow_dispatch:            # manual trigger from GitHub UI

jobs:
  generate-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install RepoWiki
        run: |
          pip install anthropic typer rich javalang pyyaml python-hcl2

      - name: Run RepoWiki
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python cli.py generate \
            --repo . \
            --output docs/wiki \
            --max-files 150

      - name: Create Pull Request with wiki update
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update RepoWiki [skip ci]"
          title: "📚 RepoWiki: auto-update documentation"
          body: |
            Automated wiki update generated by RepoWiki.
            
            **Changed pages:**
            - `docs/wiki/index.md` — project overview
            - `docs/wiki/architecture.md` — system diagrams
            - `docs/wiki/components/` — per-module pages
            - `docs/wiki/api-reference.md` — HTTP endpoints
            - `docs/wiki/infrastructure.md` — Docker/K8s/CI
            - `docs/wiki/dependencies.md` — dependency map
          branch: repowiki/auto-update
          delete-branch: true
          labels: documentation
